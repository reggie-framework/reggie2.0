# Workflow for continuous integration (CI)
name: CI

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - master
      - main
  # Runs on pull requests
  pull_request:
  # Allows running this workflow manually from the Actions tab
  workflow_dispatch:

# Permissions
permissions:
  contents:  read        # default for all jobs
  packages:  read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Environment variables
env:
  UV_LINK_MODE: copy

jobs:
# ----------------------------------------------------------------------------------------------------------------------------------------------------
# Linter
# ----------------------------------------------------------------------------------------------------------------------------------------------------
  ruff:
    name: Lint / ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - shell: bash
        run: |
          # Virtual environment
          python -m venv .venv
          source .venv/bin/activate
          # Install Ruff
          python -m pip install ruff
          # Ruff linter
          ruff --version
          ruff check --config pyproject.toml --preview reggie

  ty:
    name: Lint / ty
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - shell: bash
        run: |
          # Virtual environment
          python -m venv .venv
          source .venv/bin/activate
          # Install Ty
          python -m pip install ty
          # Type checking needs a complete install
          python -m pip install --editable .
          # Ty type checker
          ty --version
          ty check --color always --project reggie

  vulture:
    name: Lint / vulture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - shell: bash
        run: |
          # Virtual environment
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install vulture
          vulture --version
          vulture --config pyproject.toml reggie

# ----------------------------------------------------------------------------------------------------------------------------------------------------
# Compatibility
# ----------------------------------------------------------------------------------------------------------------------------------------------------
  compatibility:
    name: Compatibility / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: [ruff, ty, vulture]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python-version: "3.10" }
          - { python-version: "3.11" }
          - { python-version: "3.12" }
          - { python-version: "3.13" }
          - { python-version: "3.14" }
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/checkout@v6
      - name: Run compatibility tests
        shell: bash
        run: |
          # Virtual environment
          python -m venv .venv
          source .venv/bin/activate
          # Compatibility
          python -m pip install --editable .
          reggie --help
