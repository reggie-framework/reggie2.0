# https://pre-commit.com/
# https://github.com/pre-commit/pre-commitminimum_pre_commit_version: 4.0.1
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version
    rev: v0.15.5
    hooks:
      # Run the linter
      - id: ruff
        args: [--config, pyproject.toml, --preview]
        name: ruff linter
        alias: lint
      # Run the formatter
      - id: ruff-format
        name: ruff formatter
        alias: format

  - repo: https://github.com/jendrikseipp/vulture
    # Vulture version
    rev: v2.15
    hooks:
      # Run dead code detection
      # Paths are configured under [tool.vulture] in pyproject.toml
      - id: vulture
        args: [--config, pyproject.toml, reggie]
        name: vulture dead code
        alias: vulture

  # ty has no official pre-commit hook yet (https://github.com/astral-sh/ty/issues/269).
  # Run it as a local hook using the system-installed binary
  - repo: local
    hooks:
      - id: ty
        name: ty type checker
        alias: ty
        entry: ty check --color always --project reggie
        language: system
        pass_filenames: false
        types: [python]
